services:
  fuseki:
    image: ghcr.io/nfdi4objects/n4o-fuseki:main
    mem_limit: 3g
    memswap_limit: 3g
    stop_grace_period: 1m
    networks:
      - backend
    volumes:
      - $DATA/bartoc-graph/databases:/fuseki/databases
      - $DATA/bartoc-graph/logs:/fuseki/logs
    environment:
      - >-
        JAVA_OPTIONS=-Xms256m
        -Xmx2g
        -XX:+HeapDumpOnOutOfMemoryError
        -XX:HeapDumpPath=/fuseki/logs
        -Xlog:gc*:file=/fuseki/logs/gc.log:time,uptime,level,tags:filecount=5,filesize=20M
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null 'http://localhost:3030/n4o?query=ASK%20%7B%7D'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  importer:
    image: ghcr.io/nfdi4objects/n4o-graph-importer:main
    command: ["python", "./app.py", "--wsgi"]
    mem_limit: 768m
    memswap_limit: 768m
    networks:
      - backend
    depends_on:
      fuseki:
        condition: service_healthy
    volumes:
      - $DATA/bartoc-graph/stage:/app/stage
      - $DATA/bartoc-graph/data:/app/data:ro
    environment:
      - TITLE=BARTOC Graph Importer
      - BASE=${BARTOC_GRAPH_BASE:-https://bartoc.org/graph/}
      - SPARQL=http://fuseki:3030/n4o
      - STAGE=/app/stage
      - DATA=/app/data
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import json, urllib.request; json.load(urllib.request.urlopen('http://localhost:5020/status.json', timeout=5))"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  query-api:
    image: ghcr.io/nfdi4objects/n4o-graph-apis:main
    mem_limit: 512m
    memswap_limit: 512m
    networks:
      - backend
      - nginx
    depends_on:
      fuseki:
        condition: service_healthy
    volumes:
      - $CONFIGS/bartoc-graph/graph-api.yaml:/app/config.yaml:ro
    environment:
      - SPARQL=http://fuseki:3030/n4o
      - STAGE=
      - VIRTUAL_HOST=bartoc.org
      - VIRTUAL_PORT=8000
      - VIRTUAL_PATH=/api/sparql
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/', timeout=5).read(1)"
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 15s

  # Daily graph update. scheduler.sh keeps cron in the foreground, while
  # update.sh remains available as a one-off command for manual runs.
  updater:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/config/scheduler.sh"]
    mem_limit: 1g
    memswap_limit: 1g
    networks:
      - backend
      - egress
    depends_on:
      importer:
        condition: service_healthy
    volumes:
      - $CONFIGS/bartoc-graph:/config:ro
      - $DATA/bartoc-graph/data:/data
      - $DATA/bartoc-graph/stage:/stage:ro
    environment:
      - BARTOC_DUMP_URL=${BARTOC_GRAPH_DUMP_URL:-https://bartoc.org/data/dumps/latest.ndjson}
      - IMPORTER_URL=http://importer:5020
      - PROGRESS_INTERVAL_SECONDS=${BARTOC_GRAPH_PROGRESS_INTERVAL_SECONDS:-60}
      - RECORD_LIMIT=${BARTOC_GRAPH_RECORD_LIMIT:-1000}
    restart: unless-stopped

networks:
  backend:
    internal: true
  nginx:
    external: true
    name: nginx
  # Only the updater needs outbound access to download the public dump.
  egress:
