services:
  fuseki:
    image: ghcr.io/nfdi4objects/n4o-fuseki:main
    networks:
      - backend
    volumes:
      - $DATA/bartoc-graph/databases:/fuseki/databases
      - $DATA/bartoc-graph/logs:/fuseki/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null 'http://localhost:3030/n4o?query=ASK%20%7B%7D'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  importer:
    image: ghcr.io/nfdi4objects/n4o-graph-importer:main
    command: ["python", "./app.py", "--wsgi"]
    networks:
      - backend
    depends_on:
      fuseki:
        condition: service_healthy
    volumes:
      - $DATA/bartoc-graph/stage:/app/stage
      - $DATA/bartoc-graph/data:/app/data:ro
    environment:
      - TITLE=BARTOC Graph Importer
      - BASE=${BARTOC_GRAPH_BASE:-https://bartoc.org/graph/}
      - SPARQL=http://fuseki:3030/n4o
      - STAGE=/app/stage
      - DATA=/app/data
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import json, urllib.parse, urllib.request; json.load(urllib.request.urlopen('http://localhost:5020/status.json', timeout=5)); urllib.request.urlopen('http://fuseki:3030/n4o?' + urllib.parse.urlencode({'query': 'ASK {}'}), timeout=5).read()"
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 10s

networks:
  backend:
    internal: true
