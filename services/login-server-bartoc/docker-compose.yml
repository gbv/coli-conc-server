services:
  login-server-bartoc:
    image: ghcr.io/gbv/login-server:0.9
    networks:
      - default
      - nginx
      - mongo
    volumes:
      - $SECRETS/login-server-bartoc:/config
      - $DATA/login-server/static:/usr/src/app/static
      - $DATA/login-server-bartoc/reports:/usr/src/app/reports
    env_file:
      - $CONFIGS/login-server-bartoc.env
      - $SECRETS/login-server-bartoc.env
    restart: unless-stopped

networks:
  default:
  nginx:
    external: true
    name: nginx
  mongo:
    external: true
    name: mongo
